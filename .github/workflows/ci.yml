name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --group dev
      - name: Check lockfile
        if: matrix.python-version == '3.12'
        run: uv lock --check
      - name: Run tests
        run: uv run pytest -v --tb=short --cov=shadetriptxt --cov-report=term-missing --cov-fail-under=80
      - name: Lint
        if: matrix.python-version == '3.12'
        run: uvx ruff check shadetriptxt/
      - name: Audit dependencies
        if: matrix.python-version == '3.12'
        run: uvx pip-audit
